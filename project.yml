## Bòcan — project.yml (XcodeGen)
# Run `xcodegen generate` to regenerate Bocan.xcodeproj from this file.

name: Bocan
options:
  bundleIdPrefix: io.cloudcauldron
  deploymentTarget:
    macOS: "15.0"
  xcodeVersion: "26.0"
  generateEmptyDirectories: true
  createIntermediateGroups: true
  groupSortPosition: top
  settingPresets: app
  defaultConfig: Debug
  # Phase 1 audit #13: XcodeGen has no scheme-level TSan flag, so we patch
  # the generated `.xcscheme` after every regeneration.  See the script for
  # the exact transformation.
  postGenCommand: bash Scripts/patch-scheme.sh

configFiles:
  Debug: Secrets.xcconfig
  Release: Secrets.xcconfig

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    MACOSX_DEPLOYMENT_TARGET: "15.0"
    CURRENT_PROJECT_VERSION: 1
    ARCHS: arm64
    VALID_ARCHS: arm64
    PRODUCT_BUNDLE_IDENTIFIER: io.cloudcauldron.bocan
    INFOPLIST_FILE: Resources/Info.plist
    CODE_SIGN_ENTITLEMENTS: Resources/Bocan.entitlements
    ENABLE_HARDENED_RUNTIME: YES
    ENABLE_APP_SANDBOX: YES
    SWIFT_EMIT_LOC_STRINGS: YES
    GCC_TREAT_WARNINGS_AS_ERRORS: YES
    CLANG_ENABLE_OBJC_ARC: YES
    ALWAYS_SEARCH_USER_PATHS: NO
    # Stable Homebrew prefix symlinks — version-independent, survive brew upgrades.
    # Required so Xcode's explicit-module dependency scanner can find FFmpeg and
    # TagLib headers without relying on pkg-config (which returns volatile
    # /opt/homebrew/Cellar/<name>/<version>/include paths that break after upgrades).
    HEADER_SEARCH_PATHS: /opt/homebrew/include /opt/homebrew/opt/ffmpeg/include
      /opt/homebrew/opt/taglib/include/taglib $(inherited)
    LIBRARY_SEARCH_PATHS: /opt/homebrew/lib $(inherited)
    DEBUG_INFORMATION_FORMAT: dwarf-with-dsym
    ENABLE_TESTABILITY: YES
  configs:
    Debug:
      DEBUG_INFORMATION_FORMAT: dwarf
      ONLY_ACTIVE_ARCH: YES
      SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
    Release:
      DEBUG_INFORMATION_FORMAT: dwarf-with-dsym
      SWIFT_ACTIVE_COMPILATION_CONDITIONS: ""
      ENABLE_NS_ASSERTIONS: NO

targets:
  Bocan:
    type: application
    platform: macOS
    sources:
      - path: App
        excludes:
          - "**/*.md"
      - path: Resources
        buildPhase: resources
        excludes:
          - Info.plist
          - Bocan.entitlements
      - path: NOTICES.md
        buildPhase: resources
    settings:
      base:
        PRODUCT_NAME: Bocan
        PRODUCT_MODULE_NAME: Bocan
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        INFOPLIST_KEY_CFBundleDisplayName: "Bòcan"
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.music"
    dependencies:
      - package: Sparkle
        product: Sparkle
      - package: Observability
      - package: AudioEngine
      - package: Persistence
      - package: Playback
      - package: Library
      - package: Acoustics
      - package: Scrobble
      - package: Subsonic
      - package: UI
    preBuildScripts:
      - name: Copy and Index Help Book
        script: |
          SRC="${SRCROOT}/HelpBook/Bocan.help"
          DEST="${BUILT_PRODUCTS_DIR}/${CONTENTS_FOLDER_PATH}/Resources/Bocan.help"
          if [[ -d "$SRC" ]]; then
            rsync -a --delete "$SRC/" "$DEST/"
            hiutil -C -a -f "$DEST" 2>/dev/null || true
          fi
        inputFiles:
          - "$(SRCROOT)/HelpBook/Bocan.help/Contents/Info.plist"
        outputFiles:
          - "$(BUILT_PRODUCTS_DIR)/$(CONTENTS_FOLDER_PATH)/Resources/Bocan.help\
            /Contents/Info.plist"
        runOnlyWhenInstalling: false
    scheme:
      testTargets:
        - BocanTests
        - BocanUITests
      gatherCoverageData: true

  BocanTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Modules/Observability/Tests/ObservabilityTests
      - path: Modules/UI/Tests/UITests/ViewModelTests
      - path: App/SingleInstance.swift # compile directly so tests can verify constants
      - path: Tests/AppTests
    settings:
      base:
        PRODUCT_MODULE_NAME: BocanTests
        BUNDLE_LOADER: ""
        TEST_HOST: ""
    dependencies:
      - package: Observability
      - package: Persistence
      - package: AudioEngine
      - package: Playback
      - package: UI

  BocanUITests:
    type: bundle.ui-testing
    platform: macOS
    sources:
      - path: UITests
    settings:
      base:
        TEST_TARGET_NAME: Bocan
        PRODUCT_MODULE_NAME: BocanUITests
        BUNDLE_LOADER: ""
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGN_ENTITLEMENTS: ""
        ENABLE_APP_SANDBOX: NO
        ENABLE_HARDENED_RUNTIME: NO

packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.9.1"
  Observability:
    path: Modules/Observability
  AudioEngine:
    path: Modules/AudioEngine
  Persistence:
    path: Modules/Persistence
  Playback:
    path: Modules/Playback
  Acoustics:
    path: Modules/Acoustics
  Library:
    path: Modules/Library
  Scrobble:
    path: Modules/Scrobble
  Subsonic:
    path: Modules/Subsonic
  UI:
    path: Modules/UI
